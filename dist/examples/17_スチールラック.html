<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>17_スチールラック</title>
</head>
<body>
    <h1>17_スチールラック</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  width: { type: "number", label: "幅", unit: "mm", default: 900, constraint: { enum: [600, 900, 1200, 1500, 1800] } },
  depth: { type: "number", label: "奥行き", unit: "mm", default: 450, constraint: { enum: [300, 450, 600] } },
  height: { type: "number", label: "高さ", unit: "mm", default: 1800, constraint: { enum: [1200, 1500, 1800, 2100, 2400] } },
  color: { type: "select", label: "色", default: "#888888", options: [
    { value: "#888888", label: "#888888" },
    { value: "#eeeeee", label: "#eeeeee" },
    { value: "#224488", label: "#224488" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: {
    op: "stretch",
    shape: { op: "step", content_hash: "" },
    cut: [params2.width * 0.5, params2.depth * 0.5, params2.height * 0.5],
    delta: [params2.width - 900, params2.depth - 450, params2.height - 1800]
  } },
  { type: "message", messageType: "text", label: `価格: ¥${(5e3 + params2.width * 4 + params2.depth * 5 + params2.height * 3).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>16_光学ベンチアダプタ</title>
</head>
<body>
    <h1>16_光学ベンチアダプタ</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  hole_spacing: { type: "number", label: "穴ピッチ", unit: "mm", default: 25, constraint: { enum: [25, 50] } },
  thickness: { type: "number", label: "厚さ", unit: "mm", default: 10, constraint: { enum: [5, 10, 15, 20] } },
  color: { type: "select", label: "色", default: "#d4d4d4", options: [
    { value: "#d4d4d4", label: "#d4d4d4" },
    { value: "#222222", label: "#222222" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: { op: "step", content_hash: "" } },
  { type: "message", messageType: "text", label: `価格: ¥${(2e3 + params2.thickness * 200).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

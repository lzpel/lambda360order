<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>20_旋削シャフト</title>
</head>
<body>
    <h1>20_旋削シャフト</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  diameter: { type: "number", label: "径", unit: "mm", default: 20, constraint: { min: 5, max: 100, step: 5 } },
  length: { type: "number", label: "長さ", unit: "mm", default: 200, constraint: { min: 50, max: 1e3, step: 25 } },
  color: { type: "select", label: "色", default: "#c8c8c8", options: [
    { value: "#c8c8c8", label: "#c8c8c8" },
    { value: "#888888", label: "#888888" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: {
    op: "stretch",
    shape: { op: "step", content_hash: "" },
    cut: [0, 0, params2.length * 0.5],
    delta: [0, 0, params2.length - 200]
  } },
  { type: "message", messageType: "text", label: `価格: ¥${(1e3 + params2.diameter * params2.diameter * params2.length * 5e-4).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>01_板金制御盤ボックス</title>
</head>
<body>
    <h1>01_板金制御盤ボックス</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  width: { type: "number", label: "幅", unit: "mm", default: 300, constraint: { min: 200, max: 600, step: 10 } },
  depth: { type: "number", label: "奥行き", unit: "mm", default: 400, constraint: { min: 200, max: 800, step: 10 } },
  height: { type: "number", label: "高さ", unit: "mm", default: 150, constraint: { enum: [100, 150, 200, 2e3] } },
  color: {
    type: "select",
    label: "色",
    default: "#cccccc",
    options: [
      { value: "#cccccc", label: "#cccccc" },
      { value: "#336699", label: "#336699" },
      { value: "#993333", label: "#993333" }
    ]
  },
  email: { type: "text", label: "メールアドレス", variant: "email", placeholder: "example@example.com" }
};
const lambda = (params2) => [
  {
    type: "shape",
    axisUp: "Y",
    axisCenter: ["X", "Z"],
    shape: {
      op: "stretch",
      shape: { op: "step", content_hash: "c648cc3352136f4db46d0cbe133b6cf5bf9d208889186d0138ad9d671da72484" },
      cut: [100, 10, 100],
      delta: [params2.width - 200, params2.height - 100, params2.depth - 200]
    }
  },
  { type: "message", messageType: "text", label: `価格: ¥${(5e3 + params2.width * 10).toLocaleString()}` },
  {
    type: "action",
    label: "見積もりを送信",
    email_to: [params2.email],
    email_bcc: [],
    slack: [],
    disable: params2.email ? false : "メールアドレスを入力してください"
  }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

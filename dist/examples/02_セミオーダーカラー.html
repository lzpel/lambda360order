<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>02_セミオーダーカラー</title>
</head>
<body>
    <h1>02_セミオーダーカラー</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  diameter: { type: "number", label: "内径", unit: "mm", default: 20, constraint: { min: 10, max: 100, step: 5 } },
  length: { type: "number", label: "長さ", unit: "mm", default: 30, constraint: { min: 10, max: 200, step: 5 } },
  color: { type: "select", label: "色", default: "#aaaaaa", options: [
    { value: "#aaaaaa", label: "#aaaaaa" },
    { value: "#222222", label: "#222222" },
    { value: "#ccaa00", label: "#ccaa00" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: {
    op: "stretch",
    shape: { op: "step", content_hash: "" },
    cut: [0, 0, params2.length * 0.5],
    delta: [0, 0, params2.length - 30]
  } },
  { type: "message", messageType: "text", label: `価格: ¥${(800 + params2.diameter * 20).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

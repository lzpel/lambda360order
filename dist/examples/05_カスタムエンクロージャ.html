<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>05_カスタムエンクロージャ</title>
</head>
<body>
    <h1>05_カスタムエンクロージャ</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  width: { type: "number", label: "幅", unit: "mm", default: 200, constraint: { min: 100, max: 500, step: 20 } },
  depth: { type: "number", label: "奥行き", unit: "mm", default: 150, constraint: { min: 80, max: 400, step: 20 } },
  height: { type: "number", label: "高さ", unit: "mm", default: 100, constraint: { min: 50, max: 300, step: 20 } },
  color: { type: "select", label: "色", default: "#dddddd", options: [
    { value: "#dddddd", label: "#dddddd" },
    { value: "#1a1a1a", label: "#1a1a1a" },
    { value: "#336699", label: "#336699" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: {
    op: "stretch",
    shape: { op: "step", content_hash: "" },
    cut: [100, 75, 50],
    delta: [params2.width - 200, params2.depth - 150, params2.height - 100]
  } },
  { type: "message", messageType: "text", label: `価格: ¥${(2e3 + params2.width * 8 + params2.depth * 6 + params2.height * 5).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

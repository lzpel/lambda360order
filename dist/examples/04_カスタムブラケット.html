<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>04_カスタムブラケット</title>
</head>
<body>
    <h1>04_カスタムブラケット</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  width: { type: "number", label: "幅", unit: "mm", default: 60, constraint: { min: 30, max: 150, step: 10 } },
  thickness: { type: "number", label: "板厚", unit: "mm", default: 3, constraint: { enum: [2, 3, 4, 6] } },
  color: { type: "select", label: "色", default: "#888888", options: [
    { value: "#888888", label: "#888888" },
    { value: "#cccccc", label: "#cccccc" },
    { value: "#333333", label: "#333333" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: {
    op: "stretch",
    shape: { op: "step", content_hash: "" },
    cut: [params2.width * 0.5, 0, 0],
    delta: [params2.width - 60, 0, 0]
  } },
  { type: "message", messageType: "text", label: `価格: ¥${(500 + params2.width * 8 + params2.thickness * 50).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

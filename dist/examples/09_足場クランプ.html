<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>09_足場クランプ</title>
</head>
<body>
    <h1>09_足場クランプ</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  diameter: { type: "number", label: "対応管径", unit: "mm", default: 48.6, constraint: { enum: [34, 42.7, 48.6, 60.5] } },
  color: { type: "select", label: "色", default: "#cc4400", options: [
    { value: "#cc4400", label: "#cc4400" },
    { value: "#888888", label: "#888888" },
    { value: "#ffcc00", label: "#ffcc00" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: { op: "step", content_hash: "" } },
  { type: "message", messageType: "text", label: `価格: ¥${(600 + params2.diameter * 10).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

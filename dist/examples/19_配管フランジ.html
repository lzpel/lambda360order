<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>19_配管フランジ</title>
</head>
<body>
    <h1>19_配管フランジ</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  diameter: { type: "number", label: "呼び径", unit: "A", default: 50, constraint: { enum: [15, 20, 25, 32, 40, 50, 65, 80, 100] } },
  pressure_class: { type: "number", label: "圧力クラス", unit: "MPa", default: 1, constraint: { enum: [1, 2, 5, 10] } },
  color: { type: "select", label: "色", default: "#aaaaaa", options: [
    { value: "#aaaaaa", label: "#aaaaaa" },
    { value: "#888888", label: "#888888" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: { op: "step", content_hash: "" } },
  { type: "message", messageType: "text", label: `価格: ¥${(500 + params2.diameter * 20 + params2.pressure_class * 500).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

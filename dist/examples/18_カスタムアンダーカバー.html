<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>18_カスタムアンダーカバー</title>
</head>
<body>
    <h1>18_カスタムアンダーカバー</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  width: { type: "number", label: "幅", unit: "mm", default: 800, constraint: { min: 400, max: 1600, step: 50 } },
  length: { type: "number", label: "長さ", unit: "mm", default: 600, constraint: { min: 300, max: 1200, step: 50 } },
  color: { type: "select", label: "色", default: "#333333", options: [
    { value: "#333333", label: "#333333" },
    { value: "#888888", label: "#888888" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: {
    op: "stretch",
    shape: { op: "step", content_hash: "" },
    cut: [params2.width * 0.5, params2.length * 0.5, 0],
    delta: [params2.width - 800, params2.length - 600, 0]
  } },
  { type: "message", messageType: "text", label: `価格: ¥${(3e3 + params2.width * 4 + params2.length * 4).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>11_ウェーハ搬送治具</title>
</head>
<body>
    <h1>11_ウェーハ搬送治具</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  wafer_size: { type: "number", label: "ウェーハ径", unit: "inch", default: 8, constraint: { enum: [6, 8, 12] } },
  slots: { type: "number", label: "スロット数", unit: "枚", default: 25, constraint: { enum: [13, 25] } },
  color: { type: "select", label: "色", default: "#e0e8f0", options: [
    { value: "#e0e8f0", label: "#e0e8f0" },
    { value: "#f0f0f0", label: "#f0f0f0" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: {
    op: "stretch",
    shape: { op: "step", content_hash: "" },
    cut: [0, 0, params2.slots * 4.76 * 0.5],
    delta: [0, 0, (params2.slots - 25) * 4.76]
  } },
  { type: "message", messageType: "text", label: `価格: ¥${(3e4 + params2.wafer_size * 5e3 + params2.slots * 200).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>06_カスタムマニホールド</title>
</head>
<body>
    <h1>06_カスタムマニホールド</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  ports: { type: "number", label: "ポート数", unit: "個", default: 4, constraint: { enum: [2, 4, 6, 8] } },
  length: { type: "number", label: "全長", unit: "mm", default: 160, constraint: { min: 80, max: 400, step: 40 } },
  color: { type: "select", label: "色", default: "#b0b0b0", options: [
    { value: "#b0b0b0", label: "#b0b0b0" },
    { value: "#888888", label: "#888888" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: {
    op: "stretch",
    shape: { op: "step", content_hash: "" },
    cut: [80, 0, 0],
    delta: [params2.length - 160, 0, 0]
  } },
  { type: "message", messageType: "text", label: `価格: ¥${(8e3 + params2.ports * 1500 + params2.length * 20).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

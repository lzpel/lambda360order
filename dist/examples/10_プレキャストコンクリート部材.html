<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>10_プレキャストコンクリート部材</title>
</head>
<body>
    <h1>10_プレキャストコンクリート部材</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  width: { type: "number", label: "幅", unit: "mm", default: 1200, constraint: { min: 600, max: 2400, step: 100 } },
  length: { type: "number", label: "長さ", unit: "mm", default: 3e3, constraint: { min: 1e3, max: 6e3, step: 500 } },
  thickness: { type: "number", label: "厚さ", unit: "mm", default: 150, constraint: { enum: [100, 150, 200] } }
};
const lambda = (params2) => [
  { type: "shape", shape: {
    op: "stretch",
    shape: { op: "step", content_hash: "" },
    cut: [params2.width * 0.5, params2.length * 0.5, 0],
    delta: [params2.width - 1200, params2.length - 3e3, 0]
  } },
  { type: "message", messageType: "text", label: `価格: ¥${(params2.width * params2.length * params2.thickness * 2e-4).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>

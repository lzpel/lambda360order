<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>12_配管サポートクランプ</title>
</head>
<body>
    <h1>12_配管サポートクランプ</h1>
    <script src="https://unpkg.com/lambda360form@0.1.8/dist/lambda360form.js"></script>
    <div id="app"></div>
    <script>
        const params = {
  pipe_diameter: { type: "number", label: "管外径", unit: "mm", default: 60.5, constraint: { enum: [27.2, 34, 42.7, 48.6, 60.5, 76.3, 101.6] } },
  width: { type: "number", label: "幅", unit: "mm", default: 80, constraint: { min: 40, max: 200, step: 20 } },
  color: { type: "select", label: "色", default: "#888888", options: [
    { value: "#888888", label: "#888888" },
    { value: "#cc4400", label: "#cc4400" }
  ] }
};
const lambda = (params2) => [
  { type: "shape", shape: {
    op: "stretch",
    shape: { op: "step", content_hash: "" },
    cut: [params2.width * 0.5, 0, 0],
    delta: [params2.width - 80, 0, 0]
  } },
  { type: "message", messageType: "text", label: `価格: ¥${(400 + params2.pipe_diameter * 15 + params2.width * 5).toLocaleString()}` }
];
        Lambda360.initLambda360('#app', { input: params, lambda: lambda });
    </script>
</body>
</html>
